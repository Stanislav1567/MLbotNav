version: 1
status: draft_for_approval
source_of_truth:
  features_block: configs/features_block.yaml
  feature_formulas: src/mlbotnav/dataset.py
  hypothesis_runtime: src/mlbotnav/adaptive_auto_train.py
  search_grid_runtime: src/mlbotnav/search_gate_candidate.py
notes_ru:
- Это целевая матрица калибровки (что калибруем), а не ограничение текущей реализации.
- Long/Short калибровать раздельно.
- Для period/window/lookback ось = влево/вправо (меньше/больше окно по истории).
- Для threshold/ratio/bin_pct ось = вниз/вверх (мягче/жестче фильтр).
- 'Направление по времени: только назад, вперед запрещено.'
optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: true
    always_on:
      - volume_flow
      - price_volatility
    calibration_policy: include_context_profiles
    comparison_policy: clone_context_off_matrix_for_ab_delta
grid_presets:
  wide:
    description: full profile value range (all points)
  medium:
    description: every second point + guaranteed max
  narrow:
    description: compact center-focused set with preserved min/max anchors
