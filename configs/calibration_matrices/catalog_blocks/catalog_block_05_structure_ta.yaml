  profile: p_enter_short
- name: min_expected_move
  profile: min_expected_move
- name: notional_usd
  profile: notional_usd
constraints:
- ema_fast < ema_slow < ema_ultra
- ema_slow - ema_fast >= 5
- ema_ultra - ema_slow >= 20
- macd_fast < macd_slow
- macd_signal < macd_slow
- stoch_d_period <= stoch_k_period
- density_window_long > density_window_short
- window >= lookback + 2
- p_short < p_long
- time_direction = past_only
catalog_block_cycle:
  source_matrix: configs/calibration_full_matrix_v1.yaml
  block_index: 5
  block_name: structure_ta
  enabled_blocks:
  - structure_ta
  purpose: block-isolated Optuna catalog calibration cycle
