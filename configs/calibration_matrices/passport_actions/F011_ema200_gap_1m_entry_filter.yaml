version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T14:05:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/EMA_F009_F011_strict_passports.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B005
  registry_passport_id: F011
  action_passport_id: F011
  action_id: F011_EMA200GAP_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F011_position
    - F011_thr_pct

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: true
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide:
    description: "full passport profile value range"
  medium:
    description: "every second passport value with preserved max"
  narrow:
    description: "compact passport value set with preserved min/max anchors"

parameter_profiles:
  F011_position:
    values: [-1, 1]
    count: 2
    axis: below_above
  F011_thr_pct:
    min: 0.00
    max: 5.00
    step: 0.05
    count: 101
    axis: low_high

feature_rows:
  - block: trend_momentum
    feature: ema200_gap
    action_id: F011_EMA200GAP_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F011_position
      - F011_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F011 knobs."
