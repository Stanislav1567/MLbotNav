version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T15:50:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/VOLUME_F019_F021_strict_passports_v2.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B010
  registry_passport_id: F020
  action_passport_id: F020
  action_id: F020_VOLZ20_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F020_state
    - F020_z_level

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: true
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F020_state:
    values: [-1, 1]
    count: 2
    axis: low_high
  F020_z_level:
    min: 0.0
    max: 5.0
    step: 0.1
    count: 51
    axis: volume_z_score

feature_rows:
  - block: volume_flow
    feature: vol_z_20_1m
    action_id: F020_VOLZ20_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F020_state
      - F020_z_level

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F020 knobs."
