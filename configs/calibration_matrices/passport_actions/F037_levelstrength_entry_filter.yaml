    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F037_level_type:
    values: [1, 2, 3]
    count: 3
    axis: support_resistance_nearest
  F037_strength_state:
    values: [-1, 1]
    count: 2
    axis: weak_strong
  F037_strength_thr:
    min: 2.0
    max: 10.0
    step: 0.5
    count: 17
    axis: level_strength_score

feature_rows:
  - block: structure_ta
    feature: level_strength_1m
    action_id: F037_LEVELSTRENGTH_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F037_level_type
      - F037_strength_state
      - F037_strength_thr

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
