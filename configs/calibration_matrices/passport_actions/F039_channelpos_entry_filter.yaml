  allowed_calibration_params:
    - F039_zone
    - F039_level
    - F039_outside_thr

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F039_zone:
    values: [1, 2, 3, 4]
    count: 4
    axis: lower_upper_outside
  F039_level:
    min: 0
    max: 100
    step: 1
    count: 101
    axis: percent_position
  F039_outside_thr:
    min: 0
    max: 50
    step: 1
    count: 51
    axis: percent_outside

feature_rows:
  - block: structure_ta
    feature: trend_channel_pos_1m
    action_id: F039_CHANNELPOS_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F039_zone
      - F039_level
      - F039_outside_thr

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F039 knobs."
