version: 1
status: active_passport_action_matrix
created_utc: "2026-06-23T06:55:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/DENSITY_VPOC_F025_F034_3BLOCK_FIXED_COMMENTS.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B013
  registry_passport_id: F030
  action_passport_id: F030
  action_id: F030_BINSHARE240_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F030_cmp
    - F030_share_thr_pct

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: true
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F030_cmp:
    values: [-1, 1]
    count: 2
    axis: less_greater
  F030_share_thr_pct:
    min: 0.50
    max: 25.00
    step: 0.50
    count: 50
    axis: bin_share_pct_240

feature_rows:
  - block: density_profile
    feature: density_bin_share_240_1m
    action_id: F030_BINSHARE240_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F030_cmp
      - F030_share_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F030 knobs."
