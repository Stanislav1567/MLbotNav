version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T15:00:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/F012_rsi14_combined_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B006
  registry_passport_id: F012
  action_passport_id: F012
  action_id: F012_RSI14_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F012_signal_mode
    - F012_cmp
    - F012_level
    - F012_relation
    - F012_gap

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: true
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide:
    description: "full passport profile value range"
  medium:
    description: "every second passport value with preserved max"
  narrow:
    description: "compact passport value set with preserved min/max anchors"

parameter_profiles:
  F012_signal_mode:
    values: [1, 2]
    count: 2
    axis: level_or_rsi_ma
  F012_cmp:
    values: [-1, 1]
    count: 2
    axis: less_greater
  F012_level:
    min: 10
    max: 90
    step: 1
    count: 81
    axis: rsi_level
  F012_relation:
    values: [-1, 1]
    count: 2
    axis: below_above
  F012_gap:
    min: 0
    max: 20
    step: 1
    count: 21
    axis: rsi_ma_gap_points

feature_rows:
  - block: trend_momentum
    feature: rsi14_combined
    action_id: F012_RSI14_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F012_signal_mode
      - F012_cmp
      - F012_level
      - F012_relation
      - F012_gap

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F012 knobs."
