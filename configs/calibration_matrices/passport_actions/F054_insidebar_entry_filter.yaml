  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F054_containment_mode:
    values: [1, 2]
    count: 2
    axis: containment_mode
  F054_max_inside_range_ratio:
    min: 0.30
    max: 1.00
    step: 0.05
    count: 15
    axis: max_inside_range_ratio
  F054_mother_min_range_pct:
    min: 0.02
    max: 2.00
    step: 0.01
    count: 199
    axis: mother_min_range_pct

