version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T18:25:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/MARKET_STRUCTURE_F050_F052_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B018
  registry_passport_id: F051
  action_passport_id: F051
  action_id: F051_BOSDOWN_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F051_structure_scope
    - F051_break_buffer_pct
    - F051_confirm_bars
    - F051_require_bias

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F051_structure_scope:
    values: [1, 2]
    count: 2
    axis: structure_scope
  F051_break_buffer_pct:
    min: 0.00
    max: 1.00
    step: 0.01
    count: 101
    axis: break_buffer_pct
  F051_confirm_bars:
    values: [1, 2, 3]
    count: 3
    axis: confirm_bars
  F051_require_bias:
    values: [1, 2]
    count: 2
    axis: require_bias

feature_rows:
  - block: structure_ta
    feature: bos_down_flag_1m
    action_id: F051_BOSDOWN_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F051_structure_scope
      - F051_break_buffer_pct
      - F051_confirm_bars
      - F051_require_bias

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F051 knobs."

