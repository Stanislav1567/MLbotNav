version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T18:30:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/BREAKOUT_RETEST_F045_F049_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B017
  registry_passport_id: F046
  action_passport_id: F046
  action_id: F046_FALSEBREAK_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F046_level_source_mode
    - F046_break_dir
    - F046_false_mode
    - F046_break_buffer_pct
    - F046_return_window_bars
    - F046_return_tolerance_pct

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F046_level_source_mode:
    values: [1, 2, 3]
    count: 3
    axis: level_source_mode
  F046_break_dir:
    values: [-1, 1]
    count: 2
    axis: break_direction
  F046_false_mode:
    values: [1, 2]
    count: 2
    axis: false_breakout_mode
  F046_break_buffer_pct:
    min: 0.00
    max: 1.00
    step: 0.01
    count: 101
    axis: break_buffer_pct
  F046_return_window_bars:
    min: 1
    max: 10
    step: 1
    count: 10
    axis: return_window_bars
  F046_return_tolerance_pct:
    min: 0.00
    max: 0.30
    step: 0.01
    count: 31
    axis: return_tolerance_pct

feature_rows:
  - block: structure_ta
    feature: false_breakout_flag_1m
    action_id: F046_FALSEBREAK_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F046_level_source_mode
      - F046_break_dir
      - F046_false_mode
      - F046_break_buffer_pct
      - F046_return_window_bars
      - F046_return_tolerance_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F046 knobs."

