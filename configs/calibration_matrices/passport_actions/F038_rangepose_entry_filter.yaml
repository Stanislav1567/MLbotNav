version: 1
status: active_passport_action_matrix
created_utc: "2026-06-23T07:40:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/LEVEL_RANGE_CHANNEL_F035_F039_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B014
  registry_passport_id: F038
  action_passport_id: F038
  action_id: F038_RANGEPOSE_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F038_zone
    - F038_level

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F038_zone:
    values: [-1, 1]
    count: 2
    axis: low_high
  F038_level:
    min: 5
    max: 95
    step: 1
    count: 91
    axis: percent_position

feature_rows:
  - block: structure_ta
    feature: position_in_range_1m
    action_id: F038_RANGEPOSE_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F038_zone
      - F038_level

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F038 knobs."
