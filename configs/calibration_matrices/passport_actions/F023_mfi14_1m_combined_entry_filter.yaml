version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T16:35:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/F023_mfi14_1m_combined_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B012
  registry_passport_id: F023
  action_passport_id: F023
  action_id: F023_MFI14_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F023_signal_mode
    - F023_cmp
    - F023_level
    - F023_cross_dir
    - F023_cross_level

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: true
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F023_signal_mode:
    values: [1, 2]
    count: 2
    axis: level_or_cross_level
  F023_cmp:
    values: [-1, 1]
    count: 2
    axis: less_greater
  F023_level:
    min: 10
    max: 90
    step: 1
    count: 81
    axis: mfi_level_points
  F023_cross_dir:
    values: [-1, 1]
    count: 2
    axis: down_up
  F023_cross_level:
    min: 10
    max: 90
    step: 1
    count: 81
    axis: mfi_cross_level_points

feature_rows:
  - block: volume_flow
    feature: mfi14_1m
    action_id: F023_MFI14_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F023_signal_mode
      - F023_cmp
      - F023_level
      - F023_cross_dir
      - F023_cross_level

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F023 knobs."
