version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T13:35:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/F007_rolling_std20_1m_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B003
  registry_passport_id: F007
  action_passport_id: F007
  action_id: F007_RSTD20_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F007_cmp
    - F007_thr_pct

notes_ru:
  - "Чистая паспортная матрица F007: калибрует только действие F007_RSTD20_ALLOW."
  - "F007_cmp кодируется числом: 1 = GREATER, -1 = LESS."
  - "rolling_std_20 для F007 считается фиксированно по 20 закрытым 1m свечам, population std, percent."
  - "Выходы baseline: TP / SL / timeout; они не калибруются в паспорте F007."

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: true
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide:
    description: "full passport profile value range"
  medium:
    description: "every second passport value with preserved max"
  narrow:
    description: "compact passport value set with preserved min/max anchors"

parameter_profiles:
  F007_cmp:
    values: [-1, 1]
    count: 2
    axis: less_greater
  F007_thr_pct:
    min: 0.01
    max: 0.50
    step: 0.01
    count: 50
    axis: low_high

feature_rows:
  - block: price_volatility
    feature: rolling_std_20
    action_id: F007_RSTD20_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F007_cmp
      - F007_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F007 knobs."
