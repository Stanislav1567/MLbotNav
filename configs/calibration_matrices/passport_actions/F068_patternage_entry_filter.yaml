version: 1
status: active_passport_action_matrix
created_utc: "2026-06-23T00:45:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/PATTERN_QUALITY_F067_F068_strict_passport.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B021
  registry_passport_id: F068
  action_passport_id: F068
  action_id: F068_PATTERNAGE_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F068_age_mode
    - F068_min_age_bars
    - F068_max_age_bars

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: true
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F068_age_mode: {values: [1, 2, 3], count: 3, axis: age_mode}
  F068_min_age_bars: {min: 0, max: 20, step: 1, count: 21, axis: min_age_bars}
  F068_max_age_bars: {min: 1, max: 120, step: 1, count: 120, axis: max_age_bars}

feature_rows:
  - block: pattern
    feature: pattern_age_bars_1m
    action_id: F068_PATTERNAGE_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F068_age_mode
      - F068_min_age_bars
      - F068_max_age_bars

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints:
  - type: runtime_sanitize
    expression: F068_max_age_bars >= F068_min_age_bars

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F068 knobs."

