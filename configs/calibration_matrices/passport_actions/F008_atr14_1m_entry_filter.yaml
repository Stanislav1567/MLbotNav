version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T13:45:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/F008_atr14_1m_strict_passport_v2.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B004
  registry_passport_id: F008
  action_passport_id: F008
  action_id: F008_ATR14_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F008_cmp
    - F008_thr_pct

notes_ru:
  - "Чистая паспортная матрица F008: калибрует только действие F008_ATR14_ALLOW."
  - "F008_cmp кодируется числом: 1 = GREATER, -1 = LESS."
  - "F008 использует паспортный Wilder ATR%(14); старую базовую фичу atr14 не меняем."
  - "Выходы baseline: TP / SL / timeout; они не калибруются в паспорте F008."

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: true
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide:
    description: "full passport profile value range"
  medium:
    description: "every second passport value with preserved max"
  narrow:
    description: "compact passport value set with preserved min/max anchors"

parameter_profiles:
  F008_cmp:
    values: [-1, 1]
    count: 2
    axis: less_greater
  F008_thr_pct:
    min: 0.01
    max: 3.00
    step: 0.01
    count: 300
    axis: low_high

feature_rows:
  - block: price_volatility
    feature: atr14
    action_id: F008_ATR14_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F008_cmp
      - F008_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F008 knobs."
