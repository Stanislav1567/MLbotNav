  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/FIBONACCI_F040_F041_anchor_grid_strict_passport_v3.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B015
  registry_passport_id: F040
  action_passport_id: F040
  action_id: F040_FIB0382DIST_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F040_signal_mode
    - F040_side_state
    - F040_distance_state
    - F040_dist_thr_pct

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: true
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F040_signal_mode:
    values: [1, 2]
    count: 2
    axis: side_or_distance
  F040_side_state:
    values: [-1, 1]
    count: 2
    axis: below_above
  F040_distance_state:
    values: [-1, 1]
    count: 2
    axis: near_far
  F040_dist_thr_pct:
    min: 0.00
    max: 3.00
    step: 0.01
    count: 301
    axis: fib_0382_distance_pct

feature_rows:
  - block: structure_ta
    feature: fib_0382_distance_1m
    action_id: F040_FIB0382DIST_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F040_signal_mode
      - F040_side_state
      - F040_distance_state
      - F040_dist_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F040 knobs."
