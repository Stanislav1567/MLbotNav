version: 1
status: active_passport_action_matrix
created_utc: "2026-06-22T11:20:00Z"

source_of_truth:
  action_passport_registry: configs/calibration_action_passports.yaml
  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/RET_N_F001_F005_strict_passports.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B001
  registry_passport_id: F005
  action_passport_id: F005
  action_id: F005_RET24_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F005_move
    - F005_thr_pct

notes_ru:
  - "Чистая паспортная матрица F005: калибрует только действие F005_RET24_ALLOW."
  - "Старые ручки return_lookback/min_abs_ema_gap/trend_filter не являются ручками F005."
  - "Выходы baseline: TP / SL / timeout; они не калибруются в паспорте F005."

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: true
    trend_momentum: false
    volume_flow: false
    density_profile: false
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide:
    description: "full passport profile value range"
  medium:
    description: "every second passport value with preserved max"
  narrow:
    description: "compact passport value set with preserved min/max anchors"

parameter_profiles:
  F005_move:
    values: [-1, 1]
    count: 2
    axis: down_up
  F005_thr_pct:
    min: 0.10
    max: 2.50
    step: 0.05
    count: 49
    axis: down_up

feature_rows:
  - block: price_volatility
    feature: ret_24
    action_id: F005_RET24_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F005_move
      - F005_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F005 knobs."
