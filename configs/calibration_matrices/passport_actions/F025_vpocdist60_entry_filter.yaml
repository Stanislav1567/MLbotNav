  action_passport: docs/CALIBRATION_NODE_CURRENT/passports/features/DENSITY_VPOC_F025_F034_3BLOCK_FIXED_COMMENTS.md
  feature_formulas: src/mlbotnav/dataset.py
  backtest_runtime: src/mlbotnav/backtest.py

passport_mode:
  enabled: true
  registry_path: configs/calibration_action_passports.yaml
  registry_block_id: B013
  registry_passport_id: F025
  action_passport_id: F025
  action_id: F025_VPOCDIST60_ALLOW
  policy: allowlist
  allowed_calibration_params:
    - F025_signal_mode
    - F025_side_state
    - F025_distance_state
    - F025_dist_thr_pct

optuna_switches:
  enabled: true
  block_switches:
    price_volatility: false
    trend_momentum: false
    volume_flow: false
    density_profile: true
    structure_ta: false
    pattern: false
  hypothesis_switches:
    enabled: true
    strict_block_purity: true
  context_blocks:
    enabled: false
    always_on: []
    calibration_policy: passport_action_only
    comparison_policy: none

grid_presets:
  wide: {description: "full passport profile value range"}
  medium: {description: "every second passport value with preserved max"}
  narrow: {description: "compact passport value set with preserved min/max anchors"}

parameter_profiles:
  F025_signal_mode:
    values: [1, 2]
    count: 2
    axis: side_or_distance
  F025_side_state:
    values: [-1, 1]
    count: 2
    axis: below_above
  F025_distance_state:
    values: [-1, 1]
    count: 2
    axis: near_far
  F025_dist_thr_pct:
    min: 0.00
    max: 3.00
    step: 0.01
    count: 301
    axis: vpoc_distance_pct

feature_rows:
  - block: density_profile
    feature: density_vpoc_distance_60_1m
    action_id: F025_VPOCDIST60_ALLOW
    action_type: ENTRY_FILTER
    calibrate: true
    optuna_toggle: true
    params:
      - F025_signal_mode
      - F025_side_state
      - F025_distance_state
      - F025_dist_thr_pct

hypothesis_rows:
  - hypothesis: none
    calibrate: true
    optuna_toggle: true
    params: []

search_grid_rows: []
constraints: []

backtest_subpassport:
  exit_policy: tp_sl_timeout
  timeout_exit_enabled: true
  disable_timeout_exit: false
  note: "Backtest exit controls are baseline runtime controls, not F025 knobs."
