project:
  symbol: SOLUSDT
  timeframes: ["1m", "5m", "15m", "30m", "1h", "4h", "1d"]

data_ingest:
  source: bybit_v5
  market_type: linear
  day_batch_utc: true
  late_data_reconcile_days: 3
  retry_max: 5
  retry_backoff_base_sec: 1
  retry_jitter_sec: 0.35

storage:
  mode: file
  postgres_dsn: ""
  raw_root: data/raw/bybit_ohlcv
  core_root: data/core/bybit_ohlcv
  quarantine_root: data/quarantine/bybit_ohlcv
  meta_root: data/meta
  dq_root: data/dq
