version: 3
status: active_block_passport_registry
updated_utc: "2026-06-22T13:25:00Z"

registry:
  schema: block_passport_registry
  source_of_truth: docs/CALIBRATION_NODE_CURRENT/passports
  active_matrix_root: configs/calibration_matrices/passport_actions
  rule: "Every new calibration/backtest action must be registered here before Optuna can use it."

block_naming_policy:
  id_format: "B001, B002, B003..."
  name_rule: "Each block has a short Russian name and a technical block_key."
  feature_rule: "Each feature/action inside the block has F001, F002, F003... within the current passport route."
  no_mixing_rule: "Do not calibrate unrelated instruments together. A block may contain several related features, but baseline selection is solo unless the user approves a combination passport."

passport_flow:
  - "1. User gives a passport."
  - "2. Codex registers it under the correct Bxxx block."
  - "3. Codex creates/updates the executable YAML matrix for that passport."
  - "4. Optuna calibrates only params declared by that passport."
  - "5. Backtest reads only runtime action columns declared by that passport."
  - "6. Result is written back as PASS/NO_GO and candidate/non-candidate."

rules:
  legacy_matrix_policy: frozen_reference_only
  baseline_exit_policy: tp_sl_timeout
  long_short_policy: separate_runs_only
  optuna_policy: allow_only_params_declared_by_action_passport
  backtest_policy: use_only_action_outputs_declared_by_action_passport
  ml_policy: use_promoted_passport_candidates_only
  passport_matrix_policy: require_registry_match

