calibration_config_draft:
  source: configs/features_block.yaml
  scope: feature_formula_and_hypothesis_grid
  count_check:
    features_expected: 68
    features_mapped: 68
    missing: []
    extra: []
  global_rules:
  - count = floor((max-min)/step)+1
  - tune long_only and short_only separately
  - no forward-looking params; only backward windows/lookbacks
  - 'constraints: ema_fast < ema_slow < ema_ultra; macd_fast < macd_slow; stoch_d_period
    <= stoch_k_period; density_window_long > density_window_short'
  hypotheses:
    trend_filter:
    - adx_trend_18
    - bos_continuation_confirm
    - channel_breakout_50
    - ema_cross_20_200
    - ema_cross_20_50
    - ema_gap_sign
    - ema_stack_bull
    - fib_extension_targets
    - fib_retrace_0382_0618_trend_resume
    - hvn_lvn_density_reaction
    - min_max_range_revert
    - none
    - swing_lh_ll_short
    - value_area_rotation_vs_breakout
    - volume_profile_poc_vah_val_retest
    - wedge_breakout_plus_profile_acceptance
    backlog:
    - bos_continuation_confirm
    - fib_extension_targets
    - fib_retrace_0382_0618_trend_resume
    - hvn_lvn_density_reaction
    - max_low_pullback_long
    - min_max_range_revert
    - orderbook_imbalance_l1_l50
    - spread_pressure_and_delta_absorption
    - swing_hl_hh_long
    - swing_lh_ll_short
    - value_area_rotation_vs_breakout
    - volume_profile_poc_vah_val_retest
    - wedge_breakout_plus_profile_acceptance
    shared_calibration_params:
    - name: min_abs_ema_gap
      min: 0.0
      max: 0.08
      step: 0.01
      count: 9
      axis: up_down
      notes: applies to trend filters
    - name: horizon_bars
      min: 1
      max: 20
      step: 1
      count: 20
      axis: left_right
      notes: entry/exit horizon
    - name: p_enter_long
      min: 0.52
      max: 0.8
      step: 0.02
      count: 15
      axis: up_down
      notes: long probability threshold
    - name: p_enter_short
      min: 0.2
      max: 0.48
      step: 0.02
      count: 15
      axis: up_down
      notes: short probability threshold; must be < p_enter_long
    - name: min_expected_move_pct
      min: 0.0005
      max: 0.01
      step: 0.0005
      count: 20
      axis: up_down
      notes: minimum move filter
    - name: notional_usd
      min: 5
      max: 100
      step: 5
      count: 20
      axis: up_down
      notes: position notional for risk normalization
  blocks:
    price_volatility:
      ret_1:
        calibration_params:
        - name: return_lookback
          min: 3
          max: 30
          step: 3
          count: 10
          axis: backward
          notes: lag in bars for pct_change
      ret_3:
        calibration_params:
        - name: return_lookback
          min: 3
          max: 30
          step: 3
          count: 10
          axis: backward
          notes: lag in bars for pct_change
      ret_6:
        calibration_params:
        - name: return_lookback
          min: 3
          max: 30
          step: 3
          count: 10
          axis: backward
          notes: lag in bars for pct_change
      ret_12:
        calibration_params:
        - name: return_lookback
