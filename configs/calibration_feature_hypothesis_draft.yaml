          step: 3
          count: 10
          axis: backward
          notes: lag in bars for pct_change
      hl_spread:
        calibration_params: []
        notes: derived ratio; keep fixed
      rolling_std_20:
        calibration_params:
        - name: rolling_std_window
          min: 20
          max: 180
          step: 20
          count: 9
          axis: left_right
          notes: volatility window
      atr14:
        calibration_params:
        - name: atr_period
          min: 7
          max: 35
          step: 2
          count: 15
          axis: left_right
          notes: ATR period
    trend_momentum:
      ema_gap:
        calibration_params:
        - name: ema_fast
          min: 7
          max: 35
          step: 2
