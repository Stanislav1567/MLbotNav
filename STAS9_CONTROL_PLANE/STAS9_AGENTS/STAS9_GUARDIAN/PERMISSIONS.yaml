policy_version: "1.0"
agent_id: "STAS9_GUARDIAN"
inherits: "../../PERMISSIONS/GLOBAL_POLICY.yaml"
default_mode: "READ_ONLY"

read:
  allowed: true
  scopes:
    - "PROJECT_PATHS_AND_POLICIES_READ_ONLY"
    - "STAS9_CONTROL_PLANE/**"

write:
  default_allowed: false
  requires_user_confirmation: true
  scopes_after_confirmation:
    - "STAS9_CONTROL_PLANE/REPORTS/**"
    - "STAS9_CONTROL_PLANE/LOGS/audit.log"

prohibited:
  grant_permissions: true
  delete_files: true
  move_files: true
  modify_configurations: true
  modify_models: true
  train_models: true
  run_optuna: true
  trade_live: true
