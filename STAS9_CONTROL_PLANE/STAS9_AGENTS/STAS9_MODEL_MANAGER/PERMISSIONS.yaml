policy_version: "1.0"
agent_id: "STAS9_MODEL_MANAGER"
inherits: "../../PERMISSIONS/GLOBAL_POLICY.yaml"
default_mode: "READ_ONLY"

read:
  allowed: true
  scopes:
    - "MODEL_REGISTRY_AND_MANIFESTS_READ_ONLY"
    - "MODEL_FILES_METADATA_READ_ONLY"
    - "STAS9_CONTROL_PLANE/**"

write:
  default_allowed: false
  requires_user_confirmation: true
  scopes_after_confirmation:
    - "STAS9_CONTROL_PLANE/REPORTS/**"
    - "STAS9_CONTROL_PLANE/LOGS/**"

prohibited:
  modify_model_files: true
  replace_model_files: true
  promote_champion: true
  fix_broken_pointer: true
  train_models: true
  run_optuna: true
  delete_legacy: true
  trade_live: true
